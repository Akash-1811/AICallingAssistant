# AI Calling Assistant — PRODUCTION stack
#
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Differences from the dev compose (docker-compose.yml):
#   - Frontend is BUILT (vite build) and served as static files by nginx,
#     which also proxies /api, /ws, /health to the backend. Port 80 only.
#   - Backend runs uvicorn WITHOUT --reload and with ENVIRONMENT=production
#     (config validation refuses weak secrets at boot).
#   - Qdrant/Redis/Postgres are NOT exposed on host ports — internal network only.
#   - No source bind mounts: containers run the code baked into the images.
#
# Required environment (set in .env or the shell — never hardcoded here):
#   POSTGRES_PASSWORD   database password (compose refuses to start without it)
#   JWT_SECRET, GEMINI_API_KEY / OPENAI_API_KEY, DEEPGRAM_API_KEY  via .env
#
# TLS: terminate HTTPS in front of the frontend (Caddy, Traefik, or a cloud
# load balancer). This file deliberately keeps the stack listening on :80.

services:
  frontend:
    build:
      context: ./frontend
    image: ai-calling-assistant-web:latest
    container_name: ai_web
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    networks:
      - ai_net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-calling-assistant-api:latest
    container_name: ai_api
    env_file:
      - .env
    environment:
      ENVIRONMENT: production
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql+asyncpg://aicall:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/aicall
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: always
    networks:
      - ai_net
    volumes:
      - hf_model_cache:/home/appuser/.cache/huggingface
      - uploads:/app/data/uploads

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: ai_qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always
    networks:
      - ai_net
    healthcheck:
      test: ["CMD", "bash", "-c", "echo >/dev/tcp/127.0.0.1/6333"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: ai_redis
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - ai_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  postgres:
    image: postgres:16-alpine
    container_name: ai_postgres
    environment:
      POSTGRES_DB: aicall
      POSTGRES_USER: aicall
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    networks:
      - ai_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aicall -d aicall"]
      interval: 5s
      timeout: 5s
      retries: 8
      start_period: 10s

networks:
  ai_net:
    driver: bridge

volumes:
  qdrant_data:
  redis_data:
  postgres_data:
  hf_model_cache:
  uploads:
