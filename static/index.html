<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Calling Assistant</title>
  <style>
    :root {
      --bg: #0c0f14;
      --surface: #151a22;
      --border: #2a3344;
      --text: #e8ecf4;
      --muted: #8b97ab;
      --accent: #3d8bfd;
      --accent-dim: #2563c4;
      --success: #34d399;
      --error: #f87171;
      --font: "Segoe UI", system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(1200px 600px at 10% -10%, #1a2332 0%, var(--bg) 45%);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.5;
    }
    .wrap {
      max-width: 880px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 4rem;
    }
    header {
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.25rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0 0 0.35rem;
    }
    .sub {
      color: var(--muted);
      font-size: 0.9rem;
    }
    label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    input, textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 0.65rem 0.85rem;
      font-size: 0.95rem;
      font-family: inherit;
    }
    textarea {
      min-height: 100px;
      resize: vertical;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(61, 139, 253, 0.2);
    }
    .row {
      margin-bottom: 1rem;
    }
    button {
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dim) 100%);
      border: none;
      color: #fff;
      font-weight: 600;
      padding: 0.65rem 1.25rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    button:hover:not(:disabled) {
      filter: brightness(1.06);
    }
    .out {
      margin-top: 2rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.1rem 1.25rem;
      margin-bottom: 1rem;
    }
    .card h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin: 0 0 0.75rem;
    }
    .answer {
      font-size: 1.05rem;
      white-space: pre-wrap;
    }
    .source {
      border-left: 3px solid var(--accent);
      padding-left: 0.85rem;
      margin-bottom: 0.85rem;
    }
    .source:last-child { margin-bottom: 0; }
    .excerpt {
      font-size: 0.88rem;
      color: var(--text);
      opacity: 0.92;
    }
    .meta {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.35rem;
    }
    .err {
      color: var(--error);
      font-size: 0.9rem;
    }
    .ok { color: var(--success); font-size: 0.85rem; }
    code { font-size: 0.8rem; color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>AI Calling Assistant</h1>
      <p class="sub">Try grounded answers against your knowledge base. Open this page from the API origin (e.g. <code>http://localhost:8000/ui/</code>) so same-origin requests work without CORS setup.</p>
    </header>

    <div class="row">
      <label for="base">API base URL</label>
      <input id="base" type="text" value="" placeholder="Leave empty = same origin" />
    </div>
    <div class="row">
      <label for="key">X-API-Key (if INTERNAL_API_KEY is set)</label>
      <input id="key" type="password" autocomplete="off" placeholder="Optional" />
    </div>
    <div class="row">
      <label for="q">Question (as on a live call)</label>
      <textarea id="q" placeholder="e.g. What is the price of a 2BHK?"></textarea>
    </div>
    <button id="go" type="button">Get suggestion</button>
    <p id="hint" class="sub" style="margin-top:0.75rem"></p>

    <div class="out" id="out"></div>
  </div>
  <script>
    const $ = (id) => document.getElementById(id);
    const baseInput = $("base");
    const keyInput = $("key");
    const qInput = $("q");
    const out = $("out");
    const hint = $("hint");

    function apiBase() {
      const b = baseInput.value.trim();
      return b || window.location.origin;
    }

    $("go").addEventListener("click", async () => {
      out.innerHTML = "";
      hint.textContent = "";
      const question = qInput.value.trim();
      if (!question) {
        out.innerHTML = '<p class="err">Enter a question.</p>';
        return;
      }
      const btn = $("go");
      btn.disabled = true;
      try {
        const headers = { "Content-Type": "application/json" };
        const k = keyInput.value.trim();
        if (k) headers["X-API-Key"] = k;

        const res = await fetch(apiBase() + "/api/v1/ask", {
          method: "POST",
          headers,
          body: JSON.stringify({ question }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          out.innerHTML = '<p class="err">' + (data.detail || res.statusText || "Request failed") + "</p>";
          return;
        }
        let html = "";
        if (data.answer) {
          html += '<div class="card"><h2>Suggested reply</h2><div class="answer"></div></div>';
          out.innerHTML = html;
          out.querySelector(".answer").textContent = data.answer;
        }
        if (data.sources && data.sources.length) {
          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = "<h2>Sources</h2>";
          data.sources.forEach((s) => {
            const div = document.createElement("div");
            div.className = "source";
            div.innerHTML =
              '<div class="excerpt">' + escapeHtml(s.excerpt || "") + "</div>" +
              '<div class="meta">id: ' + escapeHtml(String(s.id ?? "—")) +
              (s.metadata ? " · " + escapeHtml(JSON.stringify(s.metadata)) : "") +
              "</div>";
            card.appendChild(div);
          });
          out.appendChild(card);
        }
        if (data.error) {
          hint.innerHTML = '<span class="err">Warning: ' + escapeHtml(data.error) + "</span>";
        } else {
          hint.innerHTML = '<span class="ok">Request completed</span>';
        }
      } catch (e) {
        out.innerHTML = '<p class="err">' + escapeHtml(String(e)) + "</p>";
      } finally {
        btn.disabled = false;
      }
    });

    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }
  </script>
</body>
</html>
