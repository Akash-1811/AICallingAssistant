# AI Calling Assistant — API + Qdrant + Redis + Vite UI (hot reload)
#
#   cp .env.example .env   # fill keys
#   docker compose up -d --build
#
# UI:  http://localhost:5173
# API: http://localhost:8000
#
# Seed demo data (one-shot):  docker compose --profile seed run --rm seed

services:
  frontend:
    image: node:20-alpine
    container_name: ai_frontend
    working_dir: /app
    environment:
      VITE_DEV_API_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - vite_node_modules:/app/node_modules
    command:
      - sh
      - -c
      - npm install && npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai_net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-calling-assistant-api:latest
    container_name: ai_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://aicall:aicall@postgres:5432/aicall
      # Windows bind mounts don't emit file-change events inside the container;
      # without polling, uvicorn --reload silently keeps running stale code.
      WATCHFILES_FORCE_POLLING: "true"
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped
    networks:
      - ai_net
    volumes:
      - .:/app
      - hf_model_cache:/home/appuser/.cache/huggingface
      - ./data/uploads:/app/data/uploads
    command:
      - uvicorn
      - app.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload
      - --proxy-headers
      - --timeout-keep-alive
      - "120"

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: qdrant_db
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - ai_net
    healthcheck:
      test: ["CMD", "bash", "-c", "echo >/dev/tcp/127.0.0.1/6333"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s

  seed:
    profiles:
      - seed
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-calling-assistant-api:latest
    container_name: ai_seed
    environment:
      QDRANT_URL: http://qdrant:6333
      HF_HOME: /home/appuser/.cache/huggingface
    volumes:
      - ./app/data:/app/app/data:ro
      - hf_model_cache:/home/appuser/.cache/huggingface
    command: ["python", "-m", "app.scripts.seed_demo_data"]
    depends_on:
      qdrant:
        condition: service_healthy
    networks:
      - ai_net

  postgres:
    image: postgres:16-alpine
    container_name: ai_postgres
    environment:
      POSTGRES_DB: aicall
      POSTGRES_USER: aicall
      POSTGRES_PASSWORD: aicall
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - ai_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aicall -d aicall"]
      interval: 5s
      timeout: 5s
      retries: 8
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - ai_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

networks:
  ai_net:
    driver: bridge

volumes:
  qdrant_data:
  redis_data:
  postgres_data:
  hf_model_cache:
  vite_node_modules:
